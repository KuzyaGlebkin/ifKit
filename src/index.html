<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ifKit Game</title>
    <link rel="stylesheet" href="/style.css" />
  </head>
  <body>
    <nav id="controls" role="navigation" aria-label="Управление игрой">
      <button id="btn-undo" type="button" aria-label="Назад">Назад</button>
      <button id="btn-redo" type="button" aria-label="Вперёд">Вперёд</button>
      <button id="btn-saves" type="button" aria-label="Сохранения">Сохранения</button>
      <button id="btn-settings" type="button" aria-label="Настройки">Настройки</button>
    </nav>

    <div id="content" role="main" aria-label="Сцена">
      <!--
        Зоны ниже создаются движком динамически (defineGame → engine.ts):
          #static        role="complementary"  — постоянная зона (если задана автором)
          #scene-content role="region"         — описание сцены
          #scene-acts    role="group"          — кнопки действий (act)
          #scene-gotos   role="navigation"     — кнопки переходов (goto)
      -->
    </div>

    <script type="module" src="/game.ts"></script>
  </body>
</html>
